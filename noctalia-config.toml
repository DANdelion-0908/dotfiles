[audio]
enable_sounds = true

[bar.default]
background_opacity = 0.50999998860061169
center = [ "clock", "control-center" ]
end = [ "tray", "clipboard", "network", "bluetooth", "volume", "brightness", "battery", "session", "notifications" ]
font_family = "FiraCode Nerd Font"
font_weight = 700
icon_color = "tertiary"
margin_ends = 15
scale = 1.0500000081956387
start = [ "launcher", "wallpaper", "workspaces", "media", "active_window" ]
widget_spacing = 25

[battery]
warning_threshold = 25

[calendar]
enabled = true

    [calendar.account.personal_google]
    color = "on_tertiary"
    name = "Daniel Penedo"
    type = "google"

[[control_center.shortcuts]]
type = "bluetooth"

[[control_center.shortcuts]]
type = "notification"

[[control_center.shortcuts]]
type = "caffeine"

[[control_center.shortcuts]]
type = "weather"

[[control_center.shortcuts]]
type = "session"

[[control_center.shortcuts]]
type = "dark_mode"

[desktop_widgets]
schema_version = 2
widget_order = []

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [desktop_widgets.widget]

[dock]
auto_hide = true
reserve_space = false

[hot_corners.top_left]
action = "control_center"

[location]
auto_locate = true

[lockscreen]
fingerprint = false

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@eDP-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 960.0
    cy = 961.0
    output = "eDP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

[nightlight]
temperature_day = 10000
temperature_night = 6100

[notification]
position = "bottom_right"

[osd]
orientation = "vertical"
position = "bottom_center"
position_vertical = "center_right"

[shell]
app_icon_color = "primary"
clipboard_enabled = false
font_family = "FiraCode Nerd Font"
password_style = "random"
screen_time_enabled = true
telemetry_enabled = true
ui_scale = 1.1500000096857548

    [shell.panel]
    clipboard_placement = "attached"
    clipboard_position = "auto"
    floating_offset = 0
    launcher_placement = "attached"
    transparency_mode = "glass"

[theme]
builtin = "Eldritch"
community_palette = "Oxocarbon"
mode = "auto"
source = "wallpaper"

    [theme.templates]
    community_ids = [ "zen-browser", "vscode", "rofi", "discord", "papirus-icons" ]

[wallpaper.default]
path = "/home/dandelion/Pictures/Wallpapers/gwen_stunning.jpg"

[wallpaper.last]
path = "/home/dandelion/Pictures/Wallpapers/gwen_stunning.jpg"

[wallpaper.monitors.eDP-1]
path = "/home/dandelion/Pictures/Wallpapers/gwen_stunning.jpg"

[widget.clipboard]
enabled = false

[widget.control-center]
enabled = true

[widget.launcher]
enabled = false

[widget.media]
enabled = true

[widget.session]
enabled = false

[widget.wallpaper]
enabled = false
